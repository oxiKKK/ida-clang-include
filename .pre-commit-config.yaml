repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: hcli-plugin-lint
        name: hcli plugin lint
        entry: hcli plugin lint .
        language: system
        pass_filenames: false
        files: \.(py|json)$
